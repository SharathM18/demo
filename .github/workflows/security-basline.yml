name: Secret Detection Baseline

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  # workflow_dispatch:
  # schedule:
  #   - cron: "0 4 * * *" # run once a day at 4 AM

permissions:
  contents: read

jobs:
  secret-scan:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Run Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2.3.9
        id: gitleaks
        with:
          args: --report-path=gitleaks-report.json --redact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Upload Report to GitHub Artifacts
        if: always() && steps.gitleaks.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-security-report
          path: gitleaks-report.json
          retention-days: 90

      - name: Check for Failures
        if: steps.gitleaks.outcome == 'failure'
        run: |
          echo "Gitleaks found secrets! Check the 'gitleaks-security-report' artifact."
          exit 1
